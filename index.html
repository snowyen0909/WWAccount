<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WUWA ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0f; font-family: 'Inter', sans-serif; }
        .acc-card { background-color: #1a1b1e; border-radius: 24px; border: 1px solid #262626; margin-bottom: 24px; }
        .summary-box { background-color: #0d0d0f; border: 1px solid #2d2f36; border-radius: 16px; transition: all 0.2s; }
        .char-row { background-color: #0d0d0f; border-radius: 16px; margin-bottom: 12px; position: relative; overflow: hidden; border: 1px solid #1a1b1e; }
        .chain-box { width: 68px; height: 68px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
        .tag-6 { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #000; font-weight: 900; box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); }
        .tag-other { background-color: #1e2024; color: #9ca3af; border: 1px solid #2d2f36; }
        .char-bg-watermark { position: absolute; right: 0; top: 0; height: 100%; opacity: 0.15; mask-image: linear-gradient(to left, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%); -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%); }
        details > summary { list-style: none; }
    </style>
</head>
<body class="text-gray-300 p-6 md:p-10">

    <div class="max-w-2xl mx-auto">
        <header class="mb-10 text-center md:text-left">
            <h1 class="text-4xl font-black text-white italic tracking-tighter">WUWA <span class="text-yellow-500">ARCHIVE</span></h1>
            <p class="text-[10px] text-gray-600 mt-2 tracking-[0.3em] uppercase flex items-center justify-center md:justify-start gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> 數據已同步
            </p>
        </header>

        <div class="flex flex-wrap gap-2 mb-4">
            <button onclick="applyFilter('all')" id="btn-all" class="px-5 py-2.5 rounded-xl text-sm font-bold bg-white text-black transition shadow-lg">全部顯示</button>
            <button onclick="applyFilter('has6')" id="btn-has6" class="px-5 py-2.5 rounded-xl text-sm font-bold text-gray-400 bg-[#1e2024] border border-gray-800 hover:text-white transition">包含滿命 (6鏈)</button>
            <button onclick="applyFilter('no6')" id="btn-no6" class="px-5 py-2.5 rounded-xl text-sm font-bold text-gray-400 bg-[#1e2024] border border-gray-800 hover:text-white transition">無滿命</button>
        </div>

        <div class="relative group mb-10">
            <input type="text" id="search-input" onkeyup="handleSearch()" placeholder="搜尋角色名稱 (例如: 西格莉卡)" class="w-full bg-[#16171a] border border-gray-800 text-white text-sm px-5 py-3.5 rounded-2xl focus:outline-none focus:border-gray-600 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="absolute right-4 top-4 h-5 w-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
        </div>

        <div id="account-list" class="space-y-6 pb-20"></div>
        <div id="empty-state" class="hidden text-center py-20 text-gray-600 italic tracking-widest">NO RECORDS FOUND</div>
    </div>

    <script>
        const API_BASE = 'https://wuwa-api.andy96990808.workers.dev'; 
        let charImages = {}, allAccountsData = [], currentFilter = 'all', searchQuery = '';

        async function fetchData() {
            try {
                const [accRes, imgRes] = await Promise.all([
                    fetch(`${API_BASE}?type=accounts&t=${Date.now()}`),
                    fetch(`${API_BASE}?type=images&t=${Date.now()}`)
                ]);
                allAccountsData = await accRes.json();
                charImages = await imgRes.json();
                updateView();
            } catch (e) { console.error(e); }
        }

        function parseCfg(s) {
            const m = s.match(/^(\d+)\+(\d+)(.+)$/);
            return m ? { c: m[1], w: m[2], n: m[3] } : { c: '?', w: '?', n: s };
        }

        function applyFilter(t) {
            currentFilter = t;
            ['all','has6','no6'].forEach(id => {
                document.getElementById('btn-'+id).className = id===t 
                    ? "px-5 py-2.5 rounded-xl text-sm font-bold bg-white text-black transition shadow-lg" 
                    : "px-5 py-2.5 rounded-xl text-sm font-bold text-gray-400 bg-[#1e2024] border border-gray-800 hover:text-white transition";
            });
            updateView();
        }

        function handleSearch() { searchQuery = document.getElementById('search-input').value.trim().toLowerCase(); updateView(); }

        function updateView() {
            let data = allAccountsData;
            
            if(currentFilter==='has6') data = data.filter(a => a["內容配置"].some(c => parseCfg(c).c === '6'));
            if(currentFilter==='no6') data = data.filter(a => !a["內容配置"].some(c => parseCfg(c).c === '6'));
            if(searchQuery) data = data.filter(a => a["內容配置"].some(c => parseCfg(c).n.toLowerCase().includes(searchQuery)));
            
            const list = document.getElementById('account-list');
            if(data.length === 0) { document.getElementById('empty-state').classList.remove('hidden'); list.innerHTML = ''; return; }
            document.getElementById('empty-state').classList.add('hidden');

            list.innerHTML = data.map(acc => {
                const cfgs = acc["內容配置"].map(c => {
                    const info = parseCfg(c);
                    const url = charImages[info.n] || '';
                    return `
                    <div class="char-row p-4 flex items-center gap-5">
                        <img src="${url}" class="char-bg-watermark">
                        <div class="chain-box ${info.c==='6'?'tag-6':'tag-other'}">
                            <span class="text-[8px] uppercase font-bold leading-none mb-1">共鳴鏈</span>
                            <span class="text-2xl font-black leading-none">${info.c}</span>
                        </div>
                        <div class="flex items-center gap-4 z-10">
                            <div class="w-12 h-12 rounded-full border-2 border-yellow-500/50 overflow-hidden bg-gray-900 shadow-xl flex-shrink-0">
                                <img src="${url}" class="w-full h-full object-cover scale-110" onerror="this.style.opacity='0'">
                            </div>
                            <div>
                                <h4 class="text-white font-bold text-lg leading-tight tracking-wide">${info.n}</h4>
                                <p class="text-[11px] text-blue-400 font-medium mt-1">專武疊影: ${info.w} 階</p>
                            </div>
                        </div>
                    </div>`;
                }).join('');

                // 動態組合信箱後綴 (若舊資料無後綴，則預設 @outlook.com)
                const fullEmail = `${acc["帳號"]}${acc["後綴"] || '@outlook.com'}`;

                return `
                <div class="acc-card p-6">
                    <details class="group">
                        <summary class="summary-box p-4 flex justify-between items-center cursor-pointer mb-6">
                            <div class="flex items-center gap-3"><span class="text-yellow-600 text-lg">🔒</span><span class="text-gray-400 font-bold text-sm tracking-wider">點擊顯示帳號密碼</span></div>
                            <span class="text-gray-400 group-open:rotate-180 transition-transform duration-300">▼</span>
                        </summary>
                        <div class="grid grid-cols-1 gap-3 mb-6 px-1 text-xs">
                            <div onclick="navigator.clipboard.writeText('${fullEmail}'); alert('信箱已複製')" class="bg-black/50 p-4 rounded-2xl border border-gray-800 flex justify-between items-center cursor-pointer hover:border-yellow-500/30 transition">
                                <div><p class="text-[9px] text-gray-500 font-bold uppercase mb-1">遊戲帳號</p><span class="text-white font-mono">${fullEmail}</span></div>
                                <span class="text-yellow-600 font-bold">複製</span>
                            </div>
                            <div onclick="navigator.clipboard.writeText('${acc["密碼"]}'); alert('密碼已複製')" class="bg-black/50 p-4 rounded-2xl border border-gray-800 flex justify-between items-center cursor-pointer hover:border-yellow-500/30 transition">
                                <div><p class="text-[9px] text-gray-500 font-bold uppercase mb-1">遊戲密碼</p><span class="text-yellow-600 font-mono">${acc["密碼"]}</span></div>
                                <span class="text-yellow-600 font-bold">複製</span>
                            </div>
                        </div>
                    </details>
                    
                    <div>
                        <div class="flex items-center gap-2 mb-4 px-1">
                            <span class="text-gray-600">👥</span>
                            <span class="text-gray-500 font-bold text-[11px] uppercase tracking-[0.2em]">角色與裝備配置</span>
                        </div>
                        <div class="grid grid-cols-1 gap-2">${cfgs}</div>
                    </div>
                </div>`;
            }).join('');
        }

        fetchData();
    </script>
</body>
</html>
